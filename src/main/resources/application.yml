spring:
  application:
    name: quan-ly-thu-vien
  datasource:
    url: ${DB_URL:jdbc:sqlserver://127.0.0.1:1433;databaseName=QuanLyThuVien;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:qltv_user}
    password: ${DB_PASSWORD:123456Abc@}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  thymeleaf:
    cache: false

server:
  port: 8080

app:
  default-borrow-days: 14
