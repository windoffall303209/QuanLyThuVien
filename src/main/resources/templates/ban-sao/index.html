<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Bản sao sách')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4">
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1">Bản sao sách</h1>
            <p class="text-muted mb-0">Dữ liệu bảng BanSao.</p>
        </div>
    </div>
    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead><tr><th>Mã sách</th><th>Copy</th><th>Ngày nhập</th><th>Tình trạng mượn</th><th>Tình trạng vật lý</th><th>Chi nhánh</th></tr></thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.maSach}"></td>
                    <td th:text="${item.copyNo}"></td>
                    <td th:text="${item.ngayNhap}"></td>
                    <td th:text="${item.tinhTrangMuon}"></td>
                    <td th:text="${item.tinhTrangVatLy}"></td>
                    <td th:text="${item.maChiNhanh}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(items)}"><td class="text-center text-muted" colspan="6">Chưa có dữ liệu.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
