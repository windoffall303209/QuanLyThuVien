<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1" th:text="${pageTitle}"></h1>
            <p class="text-muted mb-0">Nhập thông tin bảng Sach.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/sach}">Quay lại</a>
    </div>
    <div class="card shadow-sm border-0 form-card">
        <div class="card-body p-4">
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
            <form method="post" th:action="${formAction}" th:object="${sachForm}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="maSach">Mã sách</label>
                        <input class="form-control" id="maSach" th:field="*{maSach}" th:readonly="${disableMaSach}">
                        <div class="invalid-feedback d-block" th:errors="*{maSach}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="tenSach">Tên sách</label>
                        <input class="form-control" id="tenSach" th:field="*{tenSach}">
                        <div class="invalid-feedback d-block" th:errors="*{tenSach}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="tacGia">Tác giả</label>
                        <input class="form-control" id="tacGia" th:field="*{tacGia}">
                        <div class="invalid-feedback d-block" th:errors="*{tacGia}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="nhaXb">Nhà xuất bản</label>
                        <input class="form-control" id="nhaXb" th:field="*{nhaXb}">
                        <div class="invalid-feedback d-block" th:errors="*{nhaXb}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="namXb">Năm xuất bản</label>
                        <input class="form-control" id="namXb" th:field="*{namXb}" type="number">
                        <div class="invalid-feedback d-block" th:errors="*{namXb}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="soTrang">Số trang</label>
                        <input class="form-control" id="soTrang" th:field="*{soTrang}" type="number">
                        <div class="invalid-feedback d-block" th:errors="*{soTrang}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="giaTri">Giá trị</label>
                        <input class="form-control" id="giaTri" th:field="*{giaTri}" type="number" step="0.01">
                        <div class="invalid-feedback d-block" th:errors="*{giaTri}"></div>
                    </div>
                </div>
                <button class="btn btn-primary mt-4" type="submit">Lưu sách</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
