<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý sách')}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <div th:replace="~{fragments/alerts :: flashMessages}"></div>
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1">Quản lý sách</h1>
            <p class="text-muted mb-0">Theo dõi danh mục sách và tồn kho hiện có.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/books/create}">Thêm sách</a>
    </div>
    <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
    <form class="row g-2 mb-3" method="get" th:action="@{/books}">
        <div class="col-md-6">
            <input class="form-control" name="keyword" placeholder="Tìm theo tên sách, tác giả hoặc ISBN" th:value="${keyword}">
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-primary" type="submit">Tìm kiếm</button>
        </div>
    </form>
    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-hover mb-0">
                <thead><tr><th>ISBN</th><th>Tên sách</th><th>Tác giả</th><th>Thể loại</th><th>Tổng</th><th>Còn</th><th>Trạng thái</th><th class="text-end">Thao tác</th></tr></thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.category.name}"></td>
                    <td th:text="${book.totalCopies}"></td>
                    <td th:text="${book.availableCopies}"></td>
                    <td>
                        <span class="badge text-bg-success" th:if="${book.active}">Đang dùng</span>
                        <span class="badge text-bg-secondary" th:unless="${book.active}">Ngừng dùng</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{|/books/${book.id}/edit|}">Sửa</a>
                        <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
                        <form class="d-inline" method="post" th:action="@{|/books/${book.id}/delete|}">
                            <button class="btn btn-sm btn-outline-danger" th:disabled="${!book.active}" type="submit">Ngừng dùng</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(books)}"><td class="text-center text-muted" colspan="8">Không có sách phù hợp.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
