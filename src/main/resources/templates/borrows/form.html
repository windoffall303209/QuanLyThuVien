<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1" th:text="${pageTitle}"></h1>
            <p class="text-muted mb-0">Chọn thành viên, thủ thư, sách và bản sao để tạo phiếu mượn.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/muon-tra}">Quay lại</a>
    </div>
    <div class="card shadow-sm border-0 form-card">
        <div class="card-body p-4">
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
            <form method="post" th:action="@{/muon-tra/create}" th:object="${muonForm}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="maThanhVien">Thành viên</label>
                        <select class="form-select" id="maThanhVien" th:field="*{maThanhVien}">
                            <option value="">-- Chọn thành viên --</option>
                            <option th:each="member : ${members}" th:value="${member.maThanhVien}" th:text="${member.maThanhVien + ' - ' + member.hoTen}"></option>
                        </select>
                        <div class="invalid-feedback d-block" th:errors="*{maThanhVien}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="maThuThu">Thủ thư</label>
                        <select class="form-select" id="maThuThu" th:field="*{maThuThu}">
                            <option value="">-- Chọn thủ thư --</option>
                            <option th:each="librarian : ${librarians}" th:value="${librarian.maThuThu}" th:text="${librarian.maThuThu + ' - ' + librarian.hoTen}"></option>
                        </select>
                        <div class="invalid-feedback d-block" th:errors="*{maThuThu}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="maSach">Sách</label>
                        <select class="form-select" id="maSach" th:field="*{maSach}">
                            <option value="">-- Chọn sách --</option>
                            <option th:each="sach : ${saches}" th:value="${sach.maSach}" th:text="${sach.maSach + ' - ' + sach.tenSach}"></option>
                        </select>
                        <div class="invalid-feedback d-block" th:errors="*{maSach}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="copyNo">Bản sao</label>
                        <select class="form-select" id="copyNo" th:field="*{copyNo}">
                            <option value="">-- Chọn bản sao --</option>
                            <option th:each="copy : ${availableCopies}" th:value="${copy.copyNo}" th:text="${copy.maSach + ' - Copy ' + copy.copyNo}"></option>
                        </select>
                        <div class="invalid-feedback d-block" th:errors="*{copyNo}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="ngayMuon">Ngày mượn</label>
                        <input class="form-control" id="ngayMuon" th:field="*{ngayMuon}" type="date">
                        <div class="invalid-feedback d-block" th:errors="*{ngayMuon}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="ngayHenTra">Ngày hẹn trả</label>
                        <input class="form-control" id="ngayHenTra" th:field="*{ngayHenTra}" type="date">
                        <div class="invalid-feedback d-block" th:errors="*{ngayHenTra}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="ghiChu">Ghi chú</label>
                        <textarea class="form-control" id="ghiChu" rows="3" th:field="*{ghiChu}"></textarea>
                        <div class="invalid-feedback d-block" th:errors="*{ghiChu}"></div>
                    </div>
                </div>
                <button class="btn btn-primary mt-4" type="submit">Lưu phiếu mượn</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
