<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý mượn trả')}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <div th:replace="~{fragments/alerts :: flashMessages}"></div>
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1">Quản lý mượn / trả sách</h1>
            <p class="text-muted mb-0">Theo dõi dữ liệu bảng Muon.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/muon-tra/create}">Tạo phiếu mượn</a>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <!-- Tiêu đề của nhóm dữ liệu đang được hiển thị. -->
        <div class="card-header bg-white"><strong>Phiếu đang mượn</strong></div>
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-hover mb-0">
                <thead><tr><th>Thành viên</th><th>Sách</th><th>Bản sao</th><th>Ngày mượn</th><th>Hẹn trả</th><th>Trạng thái</th><th>Ghi chú</th><th class="text-end">Thao tác</th></tr></thead>
                <tbody>
                <tr th:each="borrow : ${dangMuon}">
                    <td th:text="${borrow.maThanhVien}"></td>
                    <td th:text="${borrow.maSach}"></td>
                    <td th:text="${borrow.copyNo}"></td>
                    <td th:text="${borrow.ngayMuon}"></td>
                    <td th:text="${borrow.ngayHenTra}"></td>
                    <td th:text="${borrow.trangThai}"></td>
                    <td th:text="${borrow.ghiChu}"></td>
                    <td class="text-end">
                        <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
                        <form method="post" th:action="@{|/muon-tra/${borrow.maThanhVien}/${borrow.maSach}/${borrow.copyNo}/${borrow.ngayMuon}/tra|}">
                            <button class="btn btn-sm btn-outline-success" type="submit">Trả sách</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(dangMuon)}"><td class="text-center text-muted" colspan="8">Không có phiếu đang mượn.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <!-- Tiêu đề của nhóm dữ liệu đang được hiển thị. -->
        <div class="card-header bg-white"><strong>Lịch sử mượn trả</strong></div>
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-striped mb-0">
                <thead><tr><th>Thành viên</th><th>Sách</th><th>Bản sao</th><th>Ngày mượn</th><th>Hẹn trả</th><th>Ngày trả</th><th>Trạng thái</th></tr></thead>
                <tbody>
                <tr th:each="borrow : ${tatCa}">
                    <td th:text="${borrow.maThanhVien}"></td>
                    <td th:text="${borrow.maSach}"></td>
                    <td th:text="${borrow.copyNo}"></td>
                    <td th:text="${borrow.ngayMuon}"></td>
                    <td th:text="${borrow.ngayHenTra}"></td>
                    <td th:text="${borrow.ngayTra}"></td>
                    <td th:text="${borrow.trangThai}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(tatCa)}"><td class="text-center text-muted" colspan="7">Chưa có lịch sử mượn trả.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
