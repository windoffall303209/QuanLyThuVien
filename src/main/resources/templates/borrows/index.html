<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý mượn trả')}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <div th:replace="~{fragments/alerts :: flashMessages}"></div>
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1">Quản lý mượn / trả sách</h1>
            <p class="text-muted mb-0">Theo dõi các phiếu mượn, hạn trả và trạng thái hiện tại.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/borrows/create}">Tạo phiếu mượn</a>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <!-- Tiêu đề của nhóm dữ liệu đang được hiển thị. -->
        <div class="card-header bg-white"><strong>Phiếu đang mượn</strong></div>
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-hover mb-0">
                <thead><tr><th>Độc giả</th><th>Sách</th><th>Ngày mượn</th><th>Hạn trả</th><th>Trạng thái</th><th>Ghi chú</th><th class="text-end">Thao tác</th></tr></thead>
                <tbody>
                <tr th:each="borrow : ${activeBorrows}">
                    <td th:text="${borrow.reader.fullName}"></td>
                    <td th:text="${borrow.book.title}"></td>
                    <td th:text="${borrow.borrowDate}"></td>
                    <td th:text="${borrow.dueDate}"></td>
                    <td>
                        <span class="badge text-bg-warning" th:if="${borrow.status.name() == 'BORROWED'}">Đang mượn</span>
                        <span class="badge text-bg-danger" th:if="${borrow.status.name() == 'OVERDUE'}">Quá hạn</span>
                    </td>
                    <td th:text="${borrow.notes}"></td>
                    <td class="text-end">
                        <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
                        <form method="post" th:action="@{|/borrows/${borrow.id}/return|}">
                            <button class="btn btn-sm btn-outline-success" type="submit">Trả sách</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(activeBorrows)}"><td class="text-center text-muted" colspan="7">Không có phiếu đang mượn.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <!-- Tiêu đề của nhóm dữ liệu đang được hiển thị. -->
        <div class="card-header bg-white"><strong>Lịch sử mượn trả</strong></div>
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-striped mb-0">
                <thead><tr><th>Độc giả</th><th>Sách</th><th>Ngày mượn</th><th>Hạn trả</th><th>Ngày trả</th><th>Trạng thái</th></tr></thead>
                <tbody>
                <tr th:each="borrow : ${allBorrows}">
                    <td th:text="${borrow.reader.fullName}"></td>
                    <td th:text="${borrow.book.title}"></td>
                    <td th:text="${borrow.borrowDate}"></td>
                    <td th:text="${borrow.dueDate}"></td>
                    <td th:text="${borrow.returnDate}"></td>
                    <td th:text="${borrow.status}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(allBorrows)}"><td class="text-center text-muted" colspan="6">Chưa có lịch sử mượn trả.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
