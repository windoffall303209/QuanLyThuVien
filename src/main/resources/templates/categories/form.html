<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1" th:text="${pageTitle}"></h1>
            <p class="text-muted mb-0">Nhập thông tin thể loại sách.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/categories}">Quay lại</a>
    </div>
    <div class="card shadow-sm border-0 form-card">
        <div class="card-body p-4">
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
            <form method="post" th:action="${formAction}" th:object="${categoryForm}">
                <div class="mb-3">
                    <label class="form-label" for="name">Tên thể loại</label>
                    <input class="form-control" id="name" th:field="*{name}">
                    <div class="invalid-feedback d-block" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="description">Mô tả</label>
                    <textarea class="form-control" id="description" rows="4" th:field="*{description}"></textarea>
                    <div class="invalid-feedback d-block" th:errors="*{description}"></div>
                </div>
                <button class="btn btn-primary" type="submit">Lưu thể loại</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
