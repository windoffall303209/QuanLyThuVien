<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý thể loại')}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <div th:replace="~{fragments/alerts :: flashMessages}"></div>
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1">Quản lý thể loại</h1>
            <p class="text-muted mb-0">Tạo và cập nhật danh mục thể loại sách.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/categories/create}">Thêm thể loại</a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-hover mb-0">
                <thead><tr><th>Tên thể loại</th><th>Mô tả</th><th class="text-end">Thao tác</th></tr></thead>
                <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.name}"></td>
                    <td th:text="${category.description}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{|/categories/${category.id}/edit|}">Sửa</a>
                        <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
                        <form class="d-inline" method="post" th:action="@{|/categories/${category.id}/delete|}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Xóa</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(categories)}"><td class="text-center text-muted" colspan="3">Chưa có thể loại nào.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
