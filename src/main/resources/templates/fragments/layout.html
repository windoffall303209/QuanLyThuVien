<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' - Quản Lý Thư Viện'">Quản Lý Thư Viện</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar">
<!-- Khối nội dung chính của màn hình này. -->
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Quản Lý Thư Viện</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/sach}">Sách</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/thanh-vien}">Thành viên</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/muon-tra}">Mượn / Trả</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/muon-tra/qua-han}">Quá hạn</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/chi-nhanh}">Chi nhánh</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/ban-sao}">Bản sao</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/thu-thu}">Thủ thư</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/ca-lam}">Ca làm</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cham-cong}">Chấm công</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/nha-cung-cap}">Nhà cung cấp</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cung-cap}">Cung cấp</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/giao-trinh}">Giáo trình</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/tieu-thuyet}">Tiểu thuyết</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/tap-chi}">Tạp chí</a></li>
            </ul>
            <div class="d-flex align-items-center gap-3 text-white">
                <span sec:authorize="isAuthenticated()" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                    Xin chào, <strong sec:authentication="name"></strong>
                </span>
                <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>
<script th:fragment="scripts">
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
