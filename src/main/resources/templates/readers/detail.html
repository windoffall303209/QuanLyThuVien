<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Chi tiết độc giả')}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1" th:text="${member.hoTen}"></h1>
            <p class="text-muted mb-0" th:text="${member.maThanhVien + ' - Theo dõi lịch sử mượn trả của thành viên này.'}"></p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/thanh-vien}">Quay lại</a>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3"><strong>Số điện thoại:</strong> <span th:text="${member.sdt ?: 'Chưa cập nhật'}"></span></div>
                <div class="col-md-3"><strong>Địa chỉ:</strong> <span th:text="${member.diaChi ?: 'Chưa cập nhật'}"></span></div>
                <div class="col-md-3"><strong>Ngày đăng ký:</strong> <span th:text="${member.ngayDangKy}"></span></div>
                <div class="col-md-3"><strong>Tình trạng thẻ:</strong> <span th:text="${member.tinhTrangThe}"></span></div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <!-- Tiêu đề của nhóm dữ liệu đang được hiển thị. -->
        <div class="card-header bg-white"><strong>Lịch sử mượn của thành viên</strong></div>
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-hover mb-0">
                <thead><tr><th>Mã sách</th><th>Bản sao</th><th>Ngày mượn</th><th>Ngày hẹn trả</th><th>Ngày trả</th><th>Trạng thái</th><th>Ghi chú</th></tr></thead>
                <tbody>
                <tr th:each="history : ${borrowHistories}">
                    <td th:text="${history.maSach}"></td>
                    <td th:text="${history.copyNo}"></td>
                    <td th:text="${history.ngayMuon}"></td>
                    <td th:text="${history.ngayHenTra}"></td>
                    <td th:text="${history.ngayTra}"></td>
                    <td th:text="${history.trangThai}"></td>
                    <td th:text="${history.ghiChu}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(borrowHistories)}"><td class="text-center text-muted" colspan="7">Thành viên chưa có lịch sử mượn.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
