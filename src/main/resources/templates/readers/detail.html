<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Chi tiết độc giả')}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1" th:text="${reader.fullName}"></h1>
            <p class="text-muted mb-0" th:text="${reader.readerCode + ' - Theo dõi lịch sử mượn trả của độc giả này.'}"></p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/readers}">Quay lại</a>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4"><strong>Email:</strong> <span th:text="${reader.email ?: 'Chưa cập nhật'}"></span></div>
                <div class="col-md-4"><strong>Số điện thoại:</strong> <span th:text="${reader.phone ?: 'Chưa cập nhật'}"></span></div>
                <div class="col-md-4"><strong>Địa chỉ:</strong> <span th:text="${reader.address ?: 'Chưa cập nhật'}"></span></div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <!-- Tiêu đề của nhóm dữ liệu đang được hiển thị. -->
        <div class="card-header bg-white"><strong>Sách đang mượn</strong></div>
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-hover mb-0">
                <thead><tr><th>Sách</th><th>Thể loại</th><th>Ngày mượn</th><th>Hạn trả</th><th>Trạng thái</th><th>Ghi chú</th></tr></thead>
                <tbody>
                <tr th:each="borrow : ${activeBorrows}">
                    <td th:text="${borrow.book.title}"></td>
                    <td th:text="${borrow.book.category.name}"></td>
                    <td th:text="${borrow.borrowDate}"></td>
                    <td th:text="${borrow.dueDate}"></td>
                    <td>
                        <span class="badge text-bg-warning" th:if="${borrow.status.name() == 'BORROWED'}">Đang mượn</span>
                        <span class="badge text-bg-danger" th:if="${borrow.status.name() == 'OVERDUE'}">Quá hạn</span>
                    </td>
                    <td th:text="${borrow.notes}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(activeBorrows)}"><td class="text-center text-muted" colspan="6">Độc giả hiện không mượn sách nào.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <!-- Tiêu đề của nhóm dữ liệu đang được hiển thị. -->
        <div class="card-header bg-white"><strong>Sách đã trả</strong></div>
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-striped mb-0">
                <thead><tr><th>Sách</th><th>Thể loại</th><th>Ngày mượn</th><th>Ngày trả</th><th>Ghi chú</th></tr></thead>
                <tbody>
                <tr th:each="borrow : ${returnedBorrows}">
                    <td th:text="${borrow.book.title}"></td>
                    <td th:text="${borrow.book.category.name}"></td>
                    <td th:text="${borrow.borrowDate}"></td>
                    <td th:text="${borrow.returnDate}"></td>
                    <td th:text="${borrow.notes}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(returnedBorrows)}"><td class="text-center text-muted" colspan="5">Độc giả chưa có lịch sử trả sách.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
