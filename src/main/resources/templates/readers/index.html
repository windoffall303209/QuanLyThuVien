<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý độc giả')}"></head>
<body>
<!-- Thanh điều hướng dùng chung cho toàn hệ thống. -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<!-- Khối nội dung chính của màn hình này. -->
<div class="container py-4">
    <div th:replace="~{fragments/alerts :: flashMessages}"></div>
    <!-- Tiêu đề và thao tác chính của màn hình. -->
    <div class="page-header">
        <div>
            <h1 class="h3 mb-1">Quản lý độc giả</h1>
            <p class="text-muted mb-0">Theo dõi hồ sơ độc giả của thư viện.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/readers/create}">Thêm độc giả</a>
    </div>
    <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
    <form class="row g-2 mb-3" method="get" th:action="@{/readers}">
        <div class="col-md-6">
            <input class="form-control" name="keyword" placeholder="Tìm theo mã hoặc tên độc giả" th:value="${keyword}">
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-primary" type="submit">Tìm kiếm</button>
        </div>
    </form>
    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <!-- Bảng hiển thị dữ liệu chính của màn hình. -->
            <table class="table table-hover mb-0">
                <thead><tr><th>Mã độc giả</th><th>Họ tên</th><th>Email</th><th>Điện thoại</th><th>Địa chỉ</th><th>Trạng thái</th><th class="text-end">Thao tác</th></tr></thead>
                <tbody>
                <tr th:each="reader : ${readers}">
                    <td><a class="link-primary text-decoration-none" th:href="@{|/readers/${reader.id}|}" th:text="${reader.readerCode}"></a></td>
                    <td><a class="link-dark text-decoration-none" th:href="@{|/readers/${reader.id}|}" th:text="${reader.fullName}"></a></td>
                    <td th:text="${reader.email}"></td>
                    <td th:text="${reader.phone}"></td>
                    <td th:text="${reader.address}"></td>
                    <td>
                        <span class="badge text-bg-success" th:if="${reader.active}">Hoạt động</span>
                        <span class="badge text-bg-secondary" th:unless="${reader.active}">Ngừng hoạt động</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{|/readers/${reader.id}/edit|}">Sửa</a>
                        <!-- Biểu mẫu nhập liệu hoặc lọc dữ liệu. -->
                        <form class="d-inline" method="post" th:action="@{|/readers/${reader.id}/delete|}">
                            <button class="btn btn-sm btn-outline-danger" th:disabled="${!reader.active}" type="submit">Ngừng hoạt động</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(readers)}"><td class="text-center text-muted" colspan="7">Không có độc giả phù hợp.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
